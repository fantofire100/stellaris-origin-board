<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellaris — Origin Claim Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070f;
    --surface: #0b0f1e;
    --surface2: #111827;
    --border: #1e2a42;
    --accent: #4fa3e8;
    --accent2: #7b5ea7;
    --gold: #c8a84b;
    --glow: rgba(79,163,232,0.15);
    --text: #c8d4e8;
    --muted: #5a6a85;
    --claimed: #1a3320;
    --claimed-border: #2d6644;
    --claimed-text: #5dba87;
    --danger: #c84b4b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 72%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 68% 48%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 5% 45%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 95%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 35%, rgba(255,255,255,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(79,163,232,0.04) 0%, transparent 100%);
    z-index: 1;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .logo-line::before, .logo-line::after {
    content: '';
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .logo-line::after {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.08em;
    text-shadow: 0 0 40px rgba(79,163,232,0.5);
  }

  .subtitle {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 20px;
    font-size: 13px;
    letter-spacing: 0.1em;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-num {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    color: var(--accent);
  }

  .stat-label { color: var(--muted); text-transform: uppercase; font-size: 11px; }

  /* Filters */
  .filters {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 20px 24px;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 2px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,163,232,0.08);
  }

  .filter-btn[data-filter="claimed"].active {
    border-color: var(--claimed-text);
    color: var(--claimed-text);
    background: rgba(93,186,135,0.08);
  }

  .filter-btn[data-filter="unclaimed"].active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(200,168,75,0.08);
  }

  /* Search */
  .search-wrap {
    position: relative;
    z-index: 1;
    padding: 16px 24px;
    display: flex;
    justify-content: center;
    background: var(--surface);
  }

  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    width: 100%;
    max-width: 400px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* Grid */
  .grid-container {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    padding: 24px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .origin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.25s;
    cursor: default;
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .origin-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .origin-card:hover { border-color: rgba(79,163,232,0.4); }
  .origin-card:hover::before { opacity: 1; }

  .origin-card.is-claimed {
    background: var(--claimed);
    border-color: var(--claimed-border);
  }

  .origin-card.is-claimed::before {
    background: linear-gradient(90deg, transparent, var(--claimed-text), transparent);
    opacity: 0.6;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .origin-name {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 600;
    color: #e8eef8;
    line-height: 1.3;
    flex: 1;
  }

  .dlc-badge {
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    border-radius: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .origin-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 14px;
    min-height: 36px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .claim-status {
    font-size: 12px;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .is-claimed .status-dot { background: var(--claimed-text); box-shadow: 0 0 6px var(--claimed-text); }

  .claimer-name {
    color: var(--claimed-text);
    font-weight: 600;
    font-size: 13px;
    display: none;
  }

  .claimer-name.revealed { display: block; }

  .claim-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .claim-btn:hover {
    background: rgba(79,163,232,0.15);
    box-shadow: 0 0 12px rgba(79,163,232,0.2);
  }

  .claim-btn:disabled, .claim-btn.taken {
    border-color: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    background: transparent;
  }

  .claim-btn.taken:hover { box-shadow: none; background: transparent; }

  /* DLC colors */
  .dlc-base { background: rgba(79,163,232,0.1); color: var(--accent); border: 1px solid rgba(79,163,232,0.2); }
  .dlc-humanoids { background: rgba(180,120,120,0.12); color: #e0a0a0; border: 1px solid rgba(180,120,120,0.2); }
  .dlc-plantoids { background: rgba(80,160,80,0.12); color: #78d878; border: 1px solid rgba(80,160,80,0.2); }
  .dlc-lithoids { background: rgba(140,120,100,0.12); color: #c8b090; border: 1px solid rgba(140,120,100,0.2); }
  .dlc-aquatics { background: rgba(60,140,180,0.12); color: #70c8f0; border: 1px solid rgba(60,140,180,0.2); }
  .dlc-shroud { background: rgba(150,80,180,0.12); color: #c080f0; border: 1px solid rgba(150,80,180,0.2); }
  .dlc-utopia { background: rgba(123,94,167,0.15); color: #9b7de8; border: 1px solid rgba(123,94,167,0.25); }
  .dlc-synthetic { background: rgba(120,120,180,0.12); color: #a0a0f0; border: 1px solid rgba(120,120,180,0.2); }
  .dlc-apocalypse { background: rgba(200,40,40,0.12); color: #ff4a4a; border: 1px solid rgba(200,40,40,0.3); }
  .dlc-federations { background: rgba(200,168,75,0.1); color: var(--gold); border: 1px solid rgba(200,168,75,0.2); }
  .dlc-necroids { background: rgba(180,60,60,0.12); color: #e07070; border: 1px solid rgba(180,60,60,0.2); }
  .dlc-nemesis { background: rgba(60,90,180,0.12); color: #7090e8; border: 1px solid rgba(60,90,180,0.2); }
  .dlc-overlord { background: rgba(180,120,40,0.12); color: #e0a050; border: 1px solid rgba(180,120,40,0.2); }
  .dlc-paragons { background: rgba(80,160,120,0.12); color: #60c8a0; border: 1px solid rgba(80,160,120,0.2); }
  .dlc-firstcontact { background: rgba(60,160,160,0.12); color: #60c8c8; border: 1px solid rgba(60,160,160,0.2); }
  .dlc-astral { background: rgba(160,60,160,0.12); color: #c870c8; border: 1px solid rgba(160,60,160,0.2); }
  .dlc-machineage { background: rgba(120,180,60,0.12); color: #a8d858; border: 1px solid rgba(120,180,60,0.2); }
  .dlc-cosmicstorms { background: rgba(80,130,200,0.12); color: #80b0f0; border: 1px solid rgba(80,130,200,0.2); }
  .dlc-toxoids { background: rgba(100,180,40,0.12); color: #90d840; border: 1px solid rgba(100,180,40,0.2); }
  .dlc-ancientrelics { background: rgba(200,140,60,0.12); color: #e8b060; border: 1px solid rgba(200,140,60,0.2); }
  .dlc-biogenesis { background: rgba(80,200,100,0.12); color: #50d870; border: 1px solid rgba(80,200,100,0.2); }
  .dlc-infernals { background: rgba(220,80,40,0.12); color: #f06040; border: 1px solid rgba(220,80,40,0.2); }
  .dlc-grandarchive { background: rgba(200,180,80,0.12); color: #e8d860; border: 1px solid rgba(200,180,80,0.2); }

  /* Wiki */
  .wiki-link {
  text-align: center;
  margin-top: 6px;
  margin-bottom: 10px;
}

.wiki-link a {
  color: var(--accent);
  font-size: 13px;
  text-decoration: none;
  opacity: 0.8;
  transition: 0.2s;
}

.wiki-link a:hover {
  opacity: 1;
  text-decoration: underline;
}


  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 32px;
    max-width: 420px;
    width: 100%;
    position: relative;
    box-shadow: 0 0 60px rgba(79,163,232,0.15);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: #fff;
    margin-bottom: 6px;
  }

  .modal-origin {
    color: var(--gold);
    font-size: 13px;
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }

  .modal-label {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  .modal-input:focus { border-color: var(--accent); }
  .modal-input.error { border-color: var(--danger); }

  .modal-error {
    color: var(--danger);
    font-size: 12px;
    margin-top: -16px;
    margin-bottom: 16px;
    display: none;
  }

  .modal-error.show { display: block; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  .btn-confirm {
    background: rgba(79,163,232,0.15);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 24px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-confirm:hover { background: rgba(79,163,232,0.25); box-shadow: 0 0 16px rgba(79,163,232,0.2); }

  /* Keycode footer */
  .keycode-footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .keycode-label {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .keycode-wrap {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .keycode-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-right: none;
    color: var(--text);
    padding: 8px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    outline: none;
    width: 180px;
    transition: border-color 0.2s;
  }

  .keycode-input:focus { border-color: var(--accent); }

  .keycode-btn {
    background: rgba(200,168,75,0.1);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 18px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .keycode-btn:hover { background: rgba(200,168,75,0.2); }

  .keycode-status {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 2px;
    display: none;
  }

  .keycode-status.success {
    display: inline-block;
    background: rgba(93,186,135,0.1);
    border: 1px solid var(--claimed-border);
    color: var(--claimed-text);
  }

  .keycode-status.fail {
    display: inline-block;
    background: rgba(200,75,75,0.1);
    border: 1px solid rgba(200,75,75,0.3);
    color: var(--danger);
  }

  .revealed-notice {
    display: none;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-align: center;
    padding: 6px;
    border-top: 1px solid var(--border);
  }

  .revealed-notice.show { display: block; }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
    font-family: 'Cinzel', serif;
    font-size: 18px;
    display: none;
  }

  /* Unclaim button */
  .unclaim-btn {
    background: transparent;
    border: 1px solid rgba(200,75,75,0.4);
    color: rgba(200,75,75,0.7);
    padding: 4px 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .unclaim-btn:hover { border-color: var(--danger); color: var(--danger); }

  .footer-btns { display: flex; gap: 6px; align-items: center; }
</style>
</head>
<body>

<header>
  <div class="logo-line">
    <h1>STELLARIS — ORIGIN CLAIM BOARD</h1>
  </div>

  <p class="subtitle">Exclusive Origins</p>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-num" id="total-count">0</span>
      <span class="stat-label">Total Origins</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="claimed-count">0</span>
      <span class="stat-label">Claimed</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="free-count">0</span>
      <span class="stat-label">Available</span>
    </div>
  </div>

  <div class="wiki-link">
    <a href="https://stellaris.paradoxwikis.com/Origin" target="_blank" rel="noopener noreferrer">
      📘 View all origins on the Stellaris Wiki
    </a>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="unclaimed">Available</button>
  <button class="filter-btn" data-filter="claimed">Claimed</button>
  <button class="filter-btn" data-filter="Base Game">Base Game</button>
  <button class="filter-btn" data-filter="Plantoids">Plantoids</button>
  <button class="filter-btn" data-filter="Utopia">Utopia</button>
  <button class="filter-btn" data-filter="Synthetic Dawn">Synthetic Dawn</button>
  <button class="filter-btn" data-filter="Apocalypse">Apocalypse</button>
  <button class="filter-btn" data-filter="Federations">Federations</button>
  <button class="filter-btn" data-filter="Necroids">Necroids</button>
  <button class="filter-btn" data-filter="Overlord">Overlord</button>
  <button class="filter-btn" data-filter="First Contact">First Contact</button>
  <button class="filter-btn" data-filter="Toxoids">Toxoids</button>
  <button class="filter-btn" data-filter="Galactic Paragons">Paragons</button>
  <button class="filter-btn" data-filter="Astral Planes">Astral Planes</button>
  <button class="filter-btn" data-filter="The Machine Age">Machine Age</button>
  <button class="filter-btn" data-filter="Cosmic Storms">Cosmic Storms</button>
  <button class="filter-btn" data-filter="Grand Archive">Grand Archive</button>
  <button class="filter-btn" data-filter="BioGenesis">BioGenesis</button>
  <button class="filter-btn" data-filter="Infernals">Infernals</button>
</div>

<div class="search-wrap">
  <input class="search-input" type="text" placeholder="Search origins..." id="search-input">
</div>

<div class="grid-container" id="grid">
  <div class="no-results" id="no-results">No origins match your search.</div>
</div>

<!-- Claim Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Claim Origin</div>
    <div class="modal-origin" id="modal-origin-name">—</div>
    <label class="modal-label" for="player-name">Discord Username</label>
    <input class="modal-input" type="text" id="player-name" placeholder="Enter your Discord username..." maxlength="40" autocomplete="off">
    <div class="modal-error" id="modal-error">Please enter your name.</div>

  const { data: sessionData, error: sessionError } = await db.auth.getSession();

  if (sessionData.session) {

  const { error } = await db.auth.signInAnonymously();

  if (error) {
    console.error("Anonymous sign-in error:", error);
    alert("Could not create anonymous session.");
    return false;
  }

  return true;
}

// State
let claims = {}; // { originName: playerName }
let activeFilter = "all";
let searchQuery = "";

async function loadClaims() {
  const { data, error } = await db
    .from("claims")
    .select("*");

  if (error) {
    console.error("loadClaims error:", error);
    return;
  }

  claims = {};
  data.forEach(row => {
    claims[row.origin] = {
      user_id: row.user_id,
      discord_name: row.discord_name
    };
  });
}

async function saveClaim(origin, discordName) {
  if (isAdmin) {
    const adminPassword = localStorage.getItem("stellaris_admin_pw");

    if (!adminPassword) {
      alert("Admin session missing password. Please log in again.");
      return false;
    }

    const { data, error } = await db.rpc("admin_claim_origin", {
      pw: adminPassword,
      origin_name: origin,
      discord_name_in: discordName
    });

    if (error) {
      console.error("admin_claim_origin error:", error);
      alert("Admin claim failed.");
      return false;
    }

    if (!data) {
      alert("Admin password was rejected.");
      return false;
    }

    return true;
  }

  const { data: userData, error: userError } = await db.auth.getUser();

  if (userError || !userData.user) {
    console.error("getUser error:", userError);
    alert("Could not identify your browser session.");
    return false;
  }

  const { error } = await db
    .from("claims")
    .insert([{
      origin: origin,
      user_id: userData.user.id,
      discord_name: discordName
    }]);

  if (error) {
    alert(error.message);
    console.error("saveClaim error:", error);
    return false;
  }

  return true;
}

function updateStats() {
  const total = ORIGINS.length;
  const claimedCount = Object.keys(claims).length;
  document.getElementById("total-count").textContent = total;
  document.getElementById("claimed-count").textContent = claimedCount;
  document.getElementById("free-count").textContent = total - claimedCount;
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const noResults = document.getElementById("no-results");

  // Remove existing cards
  grid.querySelectorAll(".origin-card").forEach(c => c.remove());

  const filtered = ORIGINS.filter(o => {
    const matchFilter = activeFilter === "all" ||
      (activeFilter === "claimed" && claims[o.name]) ||
      (activeFilter === "unclaimed" && !claims[o.name]) ||
      o.dlc === activeFilter;
    const matchSearch = !searchQuery || o.name.toLowerCase().includes(searchQuery) || o.dlc.toLowerCase().includes(searchQuery);
    return matchFilter && matchSearch;
  });

  noResults.style.display = filtered.length === 0 ? "block" : "none";

  filtered.forEach((origin, i) => {
    const isClaimed = !!claims[origin.name];
	const isOwner = isClaimed && claims[origin.name].user_id === currentUserId;
	const canRelease = isOwner || isAdmin;
    const card = document.createElement("div");
    card.className = "origin-card" + (isClaimed ? " is-claimed" : "");
    card.dataset.origin = origin.name;
    card.style.animationDelay = (i * 0.025) + "s";

    const dlcClass = DLC_CLASS[origin.dlc] || "dlc-base";

    card.innerHTML = `
      <div class="card-header">
        <div class="origin-name">${origin.name}</div>
        <span class="dlc-badge ${dlcClass}">${origin.dlc}</span>
      </div>
      <div class="origin-desc">${origin.desc}</div>
      <div class="card-footer">
        <div class="claim-status">
          <span class="status-dot"></span>
${isClaimed
  ? `<span style="color:var(--muted);font-size:12px;">
       Claimed${(isAdmin || isOwner) ? ` — ${claims[origin.name].discord_name}` : ""}
     </span>`
  : `<span style="color:var(--muted);font-size:12px;">Available</span>`
}
        </div>
        <div class="footer-btns">
${isClaimed
  ? `<button class="unclaim-btn" data-origin="${origin.name}" style="${canRelease ? 'display:inline-block' : 'display:none'}">Release</button>`
  : `<button class="claim-btn" data-origin="${origin.name}">Claim</button>`
}
        </div>
      </div>
    `;

    grid.appendChild(card);
  });

  updateStats();
}

// Claim modal
function openModal(originName) {
  pendingOrigin = originName;
  document.getElementById("modal-origin-name").textContent = originName;
  document.getElementById("player-name").value = "";
  document.getElementById("player-name").classList.remove("error");
  document.getElementById("modal-error").classList.remove("show");
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("player-name").focus(), 100);
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  pendingOrigin = null;
}

async function confirmClaim() {
  const name = document.getElementById("player-name").value.trim();

  if (!name) {
    document.getElementById("player-name").classList.add("error");
    document.getElementById("modal-error").classList.add("show");
    return;
  }

  if (pendingOrigin) {
    const success = await saveClaim(pendingOrigin, name);

    if (success) {
      await loadClaims();
      renderGrid();
    }
  }

  closeModal();
}

function openAdminModal() {
  document.getElementById("admin-password").value = "";
  document.getElementById("admin-error").classList.remove("show");
  document.getElementById("admin-modal").classList.add("open");
}

function closeAdminModal() {
  document.getElementById("admin-modal").classList.remove("open");
}

async function confirmAdminLogin() {
  const password = document.getElementById("admin-password").value;

  const ok = await loginWithAdminPassword(password);

  if (!ok) {
    document.getElementById("admin-error").classList.add("show");
    return;
  }

  closeAdminModal();
}

async function loginWithAdminPassword(password) {
  const { data, error } = await db.rpc("check_admin", {
    pw: password
  });

  if (error) {
    console.error("Admin password check error:", error);
    return false;
  }

  if (!data) {
    return false;
  }

  isAdmin = true;
  localStorage.setItem("stellaris_admin_pw", password);

  await loadClaims();
  updateAdminButtons();
  renderGrid();
  return true;
}
async function logoutAdmin() {
  isAdmin = false;
localStorage.removeItem("stellaris_admin_pw");

  await loadClaims();
  updateAdminButtons();
  renderGrid();
}

function updateAdminButtons() {
  document.getElementById("admin-login-btn").style.display = isAdmin ? "none" : "inline-block";
  document.getElementById("admin-logout-btn").style.display = isAdmin ? "inline-block" : "none";
}

async function releaseClaim(originName) {
  if (!confirm(`Release claim on "${originName}"?`)) return;

  const { error } = await db
    .from("claims")
    .delete()
    .eq("origin", originName);

  if (error) {
    alert(error.message);
    console.error("releaseClaim error:", error);
    return;
  }

  await loadClaims();
  renderGrid();
}

// Event delegation
document.getElementById("grid").addEventListener("click", e => {
  const claimBtn = e.target.closest(".claim-btn");
  const unclaimBtn = e.target.closest(".unclaim-btn");
  if (claimBtn && !claimBtn.disabled) {
    openModal(claimBtn.dataset.origin);
  }
  if (unclaimBtn) {
    releaseClaim(unclaimBtn.dataset.origin);
  }
});
document.getElementById("admin-login-btn").addEventListener("click", openAdminModal);
document.getElementById("admin-logout-btn").addEventListener("click", logoutAdmin);

document.getElementById("admin-cancel").addEventListener("click", closeAdminModal);
document.getElementById("admin-confirm").addEventListener("click", confirmAdminLogin);

document.getElementById("admin-modal").addEventListener("click", e => {
  if (e.target === document.getElementById("admin-modal")) closeAdminModal();
});

document.getElementById("admin-password").addEventListener("keydown", e => {
  if (e.key === "Enter") confirmAdminLogin();
  if (e.key === "Escape") closeAdminModal();
});
document.getElementById("btn-cancel").addEventListener("click", closeModal);
document.getElementById("btn-confirm").addEventListener("click", confirmClaim);
document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) closeModal();
});

document.getElementById("player-name").addEventListener("keydown", e => {
  if (e.key === "Enter") confirmClaim();
  if (e.key === "Escape") closeModal();
});

// Filters
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderGrid();
  });
});

// Search
document.getElementById("search-input").addEventListener("input", e => {
  searchQuery = e.target.value.trim().toLowerCase();
  renderGrid();
});

// Init
async function init() {
  const ok = await ensureAnonymousUser();
  if (!ok) return;

  currentUserId = await getCurrentUserId();
  isAdmin = localStorage.getItem("stellaris_admin") === "true";

  await loadClaims();
  updateAdminButtons();
  renderGrid();
}

init();
</script>
